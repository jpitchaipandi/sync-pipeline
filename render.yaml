# Render Blueprint for sync-pipeline.
services:
  - type: web
    name: sync-pipeline-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build && npm run migrate:prod
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: API_SECRET
        generateValue: true
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false

# Scheduled syncs are configured externally on cron-job.org (free tier
# alternative — Render's Cron Job service requires a paid plan).
#
# cron-job.org setup:
#   URL:      https://sync-pipeline-api.onrender.com/sync/all
#   Method:   POST
#   Schedule: every 10 minutes (under the 15-min free-tier spin-down threshold)
#   Headers:  Authorization: Bearer <API_SECRET>
#
# The src/cron-runner.ts script in this repo remains useful for ad-hoc
# invocation or other CI cron providers (GitHub Actions, Vercel cron, etc.).
