# Render Blueprint for sync-pipeline.
services:
  - type: web
    name: sync-pipeline-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build && npm run migrate:prod
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: API_SECRET
        generateValue: true
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false

  # Scheduled cron: fires every 10 minutes (under the 15-min free-tier
  # spin-down threshold) so the web service stays warm AND each source
  # runs an incremental sync. Calls POST /sync/all via bearer auth.
  - type: cron
    name: sync-pipeline-cron
    runtime: node
    region: oregon
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: npm ci && npm run build
    startCommand: node dist/cron-runner.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: WEB_SERVICE_URL
        sync: false  # Set to the deployed sync-pipeline-api URL in the dashboard
      - key: API_SECRET
        sync: false  # Must match the value generated for sync-pipeline-api
